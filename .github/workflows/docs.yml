name: docs

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab — useful for re-deploying docs after a settings tweak.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys racing each other; only the last push to main matters.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Dokka HTML
        run: ./gradlew :sdk:dokkaHtml --no-configuration-cache --stacktrace

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sdk/build/dokka/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
