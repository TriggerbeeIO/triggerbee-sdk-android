name: publish

on:
  push:
    tags:
      - 'v*'
  # Manual trigger from the Actions tab for snapshot pushes between tags.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: read

    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify tag matches gradle SDK version
        # Tag-driven publish is safe only when the git tag and the version embedded in
        # sdk/build.gradle.kts agree — otherwise we'd publish (say) 0.2.0-SNAPSHOT under a
        # `v0.2.0` tag and consumers couldn't reproduce a build from source. Skip the check
        # on workflow_dispatch (snapshot pushes between tags) where there's no tag.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep -E '^val sdkVersion\s*=' sdk/build.gradle.kts | sed -E 's/.*"(.*)".*/\1/')
          echo "Tag: $TAG_VERSION"
          echo "Gradle: $GRADLE_VERSION"
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag '$TAG_VERSION' does not match gradle SDK version '$GRADLE_VERSION'. Bump sdk/build.gradle.kts before tagging." >&2
            exit 1
          fi

      - name: Unit tests
        run: ./gradlew :sdk:test --stacktrace

      - name: Publish to Maven Central
        # publishAndReleaseToMavenCentral closes + releases the staging repo automatically for
        # non-SNAPSHOT versions. SNAPSHOT versions go to the OSS snapshots repo and skip the
        # release step. Configuration cache is disabled here because the Vanniktech plugin
        # interacts with Gradle properties at configuration time.
        run: ./gradlew :sdk:publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
